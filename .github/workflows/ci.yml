name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Build
        run: cargo build --all-features --verbose
      - name: Test
        run: cargo test --all-features --verbose

  python-package:
    name: Build Python Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install build and test tools
        run: >-
          python -m pip install "maturin>=1.5,<2.0" "pandas>=2.0"
          "pytest>=8.0" "nbclient>=0.10" "ipykernel>=6.0"
      - name: Build wheel
        working-directory: crates/fiml-python
        run: maturin build --release --out dist
      - name: Install wheel
        run: python -m pip install crates/fiml-python/dist/*.whl
      - name: Test Python API
        run: python -m pytest crates/fiml-python/tests
      - name: Execute notebook
        working-directory: notebooks
        run: jupyter execute test.ipynb --timeout=120
